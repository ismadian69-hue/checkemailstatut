<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Checker ULTRA</title>

<style>
body{
font-family:Arial;
background:#f4f8ff;
margin:0;
padding:30px;
color:#111;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
margin-top:0;
color:#1565ff;
}

textarea{
width:100%;
height:220px;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

button{
padding:12px 18px;
border:0;
background:#1565ff;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.stats{
display:flex;
gap:15px;
margin:20px 0;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:120px;
background:#eef4ff;
padding:15px;
border-radius:12px;
text-align:center;
}

#progress{
height:12px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin:15px 0;
}

#bar{
height:100%;
width:0%;
background:#1565ff;
}

#results{
background:#f8faff;
padding:15px;
border-radius:12px;
white-space:pre-wrap;
max-height:400px;
overflow:auto;
}
</style>
</head>

<body>

<div class="box">

<h1>Email Checker ULTRA</h1>

<textarea id="emails" placeholder="email1@gmail.com&#10;email2@yahoo.com"></textarea>

<br>
<button onclick="runCheck()">Start Check</button>
<button onclick="download('valid')">Export Valid</button>
<button onclick="download('invalid')">Export Invalid</button>

<div class="stats">
<div class="card">Checked<br><b id="checked">0</b></div>
<div class="card">Valid<br><b id="valid">0</b></div>
<div class="card">Invalid<br><b id="invalid">0</b></div>
<div class="card">Risky<br><b id="risky">0</b></div>
</div>

<div id="progress"><div id="bar"></div></div>

<div id="results"></div>

</div>

<script>
let validList=[];
let invalidList=[];
let riskyList=[];

async function runCheck(){

validList=[]; invalidList=[]; riskyList=[];

let emails=document.getElementById("emails").value
.split("\n")
.map(x=>x.trim())
.filter(Boolean);

let total=emails.length;
let done=0;

document.getElementById("results").textContent="";

for(let email of emails){

try{
 let r=await fetch("/api/check?email="+encodeURIComponent(email));
 let j=await r.json();

 if(j.status=="valid") validList.push(email);
 else if(j.status=="risky") riskyList.push(email);
 else invalidList.push(email);

 document.getElementById("results").textContent +=
 email+" => "+j.status+" ("+j.reason+")\n";

}catch(e){
 invalidList.push(email);
}

done++;

document.getElementById("checked").textContent=done;
document.getElementById("valid").textContent=validList.length;
document.getElementById("invalid").textContent=invalidList.length;
document.getElementById("risky").textContent=riskyList.length;

document.getElementById("bar").style.width =
((done/total)*100)+"%";

}

}

function download(type){

let data="";

if(type=="valid") data=validList.join("\n");
if(type=="invalid") data=invalidList.join("\n");
if(type=="risky") data=riskyList.join("\n");

let blob=new Blob([data],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=type+".txt";
a.click();

}
</script>

</body>
</html>
