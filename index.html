<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Checker</title>
<style>
body{font-family:Arial;padding:20px;background:#111;color:#fff}
textarea{width:100%;height:220px;background:#222;color:#fff;border:1px solid #444;padding:10px}
button{padding:10px 18px;margin:8px 0;background:#0a84ff;color:#fff;border:0;cursor:pointer}
pre{background:#222;padding:10px;white-space:pre-wrap}
</style>
</head>
<body>
<h2>Email SMTP Checker</h2>
<p>Paste emails (1 per line)</p>
<textarea id="emails"></textarea><br>
<button onclick="runCheck()">Check</button>
<pre id="out"></pre>
<script>
async function runCheck(){
 const lines=document.getElementById('emails').value.split('\n').map(x=>x.trim()).filter(Boolean);
 let out='';
 for(const email of lines){
   out += 'Checking '+email+'...\n';
   document.getElementById('out').textContent=out;
   try{
     const r=await fetch('/api/check?email='+encodeURIComponent(email));
     const j=await r.json();
     out += email+' => '+j.status+' ('+(j.reason||'')+')\n\n';
   }catch(e){
     out += email+' => error\n\n';
   }
   document.getElementById('out').textContent=out;
 }
}
</script>
</body>
</html>
