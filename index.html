<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Checker PRO</title>
<style>
body{background:#0d0d0d;color:#fff;font-family:Arial;padding:20px}
textarea{width:100%;height:220px;background:#111;color:#0f0;border:1px solid #333;padding:10px}
button{padding:12px 18px;background:#00aa44;color:#fff;border:0;cursor:pointer;margin-top:10px}
#out{white-space:pre-wrap;background:#111;padding:15px;margin-top:15px}
</style>
</head>
<body>

<h1>Email Checker PRO</h1>

<textarea id="emails" placeholder="email1@gmail.com&#10;email2@yahoo.com"></textarea>
<br>
<button onclick="runCheck()">CHECK</button>

<div id="out"></div>

<script>
async function runCheck(){
 let emails=document.getElementById("emails").value.split("\n").map(x=>x.trim()).filter(Boolean);

 let out="";
 let valid=0,invalid=0,risky=0;

 for(let email of emails){
   out += "Checking "+email+"...\n";
   document.getElementById("out").textContent=out;

   try{
      let r=await fetch("/api/check?email="+encodeURIComponent(email));
      let j=await r.json();

      if(j.status=="valid") valid++;
      else if(j.status=="risky") risky++;
      else invalid++;

      out += email+" => "+j.status+" ("+j.reason+")\n\n";

   }catch(e){
      out += email+" => error\n\n";
   }

   document.getElementById("out").textContent =
   "VALID: "+valid+" | INVALID: "+invalid+" | RISKY: "+risky+"\n\n"+out;
 }
}
</script>

</body>
</html>
